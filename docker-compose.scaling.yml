services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      SKU_PARSER_DATA_DIR: /data
      MAX_CONCURRENT_PARSE_JOBS: "2"
      WEB_CONCURRENCY: "4"
    expose:
      - "5000"
    volumes:
      - sku_shared_data:/data
    restart: unless-stopped

  lb:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "5000:80"
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  sku_shared_data:
