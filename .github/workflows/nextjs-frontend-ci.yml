name: Next.js Frontend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "frontend/**"
      - ".github/workflows/nextjs-frontend-ci.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "frontend/**"
      - ".github/workflows/nextjs-frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: nextjs-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint and Build (Node 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          set +e
          npm run build -- --webpack > /tmp/frontend-build-webpack.log 2>&1
          webpack_status=$?
          echo "Webpack exit code: ${webpack_status}"
          if [ "$webpack_status" -eq 0 ]; then
            cat /tmp/frontend-build-webpack.log
            exit 0
          fi

          npm run build > /tmp/frontend-build-turbo.log 2>&1
          turbo_status=$?
          echo "Turbopack exit code: ${turbo_status}"
          if [ "$turbo_status" -eq 0 ]; then
            cat /tmp/frontend-build-turbo.log
            exit 0
          fi

          echo "Webpack build failed:"
          cat /tmp/frontend-build-webpack.log
          echo "Turbopack build failed:"
          cat /tmp/frontend-build-turbo.log
          echo "::error file=frontend-build::webpack exit code=${webpack_status}, turbopack exit code=${turbo_status}"

          while IFS= read -r line; do
            esc="${line//'%'/'%25'}"
            esc="${esc//$'\r'/'%0D'}"
            esc="${esc//$'\n'/'%0A'}"
            echo "::error file=frontend-build-webpack::${esc}"
          done < <(tail -n 25 /tmp/frontend-build-webpack.log)

          while IFS= read -r line; do
            esc="${line//'%'/'%25'}"
            esc="${esc//$'\r'/'%0D'}"
            esc="${esc//$'\n'/'%0A'}"
            echo "::error file=frontend-build-turbo::${esc}"
          done < <(tail -n 25 /tmp/frontend-build-turbo.log)

          exit 1
