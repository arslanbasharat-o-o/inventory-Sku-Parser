name: Next.js Frontend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "frontend/**"
      - ".github/workflows/nextjs-frontend-ci.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "frontend/**"
      - ".github/workflows/nextjs-frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: nextjs-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint and Build (Node 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --include=optional --no-audit --no-fund

      - name: Verify Next.js SWC binary
        run: |
          node -e "console.log('next', require('next/package.json').version)"
          node -e "try { console.log('swc-linux-gnu', require.resolve('@next/swc-linux-x64-gnu')); } catch (e) { console.error(e); process.exit(1); }"

      - name: Lint
        run: npm run lint

      - name: Build
        shell: bash
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_DISABLE_SWC_WORKER: "1"
        run: |
          set -euo pipefail
          echo "Webpack build attempt 1/2"
          if npm run build -- --webpack; then
            exit 0
          fi
          echo "Webpack build attempt 1 failed; retrying once..."
          sleep 5
          echo "Webpack build attempt 2/2"
          if npm run build -- --webpack; then
            exit 0
          fi
          echo "Webpack failed twice; trying Turbopack fallback once..."
          npm run build
