name: Python Backend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "**/*.py"
      - "**/*.json"
      - "requirements.txt"
      - ".github/workflows/python-backend-ci.yml"
      - "deploy/docker/Dockerfile.api"
      - "tests/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "**/*.py"
      - "**/*.json"
      - "requirements.txt"
      - ".github/workflows/python-backend-ci.yml"
      - "deploy/docker/Dockerfile.api"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: python-backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Vector stack is optional and heavyweight; exclude in CI for speed/stability.
          grep -vE '^(sentence-transformers|faiss-cpu)' requirements.txt > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install flake8 pytest

      - name: Lint
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=.venv,frontend,node_modules,__pycache__

      - name: Compile check
        run: python -m py_compile backend/*.py

      - name: Test
        env:
          PYTHONPATH: .
        run: pytest -q
