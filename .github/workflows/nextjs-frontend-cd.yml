name: Next.js Frontend CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "frontend/**"
      - ".github/workflows/nextjs-frontend-cd.yml"
  workflow_dispatch:

concurrency:
  group: nextjs-frontend-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_package:
    name: Build and Package Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --include=optional --no-audit --no-fund

      - name: Verify Next.js SWC binary
        run: |
          node -e "console.log('next', require('next/package.json').version)"
          node -e "try { console.log('swc-linux-gnu', require.resolve('@next/swc-linux-x64-gnu')); } catch (e) { console.error(e); process.exit(1); }"

      - name: Lint
        run: npm run lint

      - name: Build
        shell: bash
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_DISABLE_SWC_WORKER: "1"
        run: |
          set +e

          npm run build -- --webpack > /tmp/frontend-build-webpack.log 2>&1
          webpack_status=$?
          if [ "$webpack_status" -eq 0 ]; then
            cat /tmp/frontend-build-webpack.log
            exit 0
          fi

          npm run build > /tmp/frontend-build-turbo.log 2>&1
          turbo_status=$?
          if [ "$turbo_status" -eq 0 ]; then
            cat /tmp/frontend-build-turbo.log
            exit 0
          fi

          echo "::error file=frontend-build::webpack exit code=${webpack_status}, turbopack exit code=${turbo_status}"

          echo "::group::Webpack build log"
          cat /tmp/frontend-build-webpack.log || true
          echo "::endgroup::"

          echo "::group::Turbopack build log"
          cat /tmp/frontend-build-turbo.log || true
          echo "::endgroup::"

          tr '\r' '\n' < /tmp/frontend-build-webpack.log > /tmp/frontend-build-webpack.norm.log
          tr '\r' '\n' < /tmp/frontend-build-turbo.log > /tmp/frontend-build-turbo.norm.log
          tail -n 300 /tmp/frontend-build-webpack.norm.log > /tmp/frontend-build-webpack.tail.log
          tail -n 300 /tmp/frontend-build-turbo.norm.log > /tmp/frontend-build-turbo.tail.log

          while IFS= read -r line; do
            esc="${line//'%'/'%25'}"
            esc="${esc//$'\r'/'%0D'}"
            esc="${esc//$'\n'/'%0A'}"
            echo "::error file=frontend-build-webpack::${esc}"
          done < /tmp/frontend-build-webpack.tail.log

          while IFS= read -r line; do
            esc="${line//'%'/'%25'}"
            esc="${esc//$'\r'/'%0D'}"
            esc="${esc//$'\n'/'%0A'}"
            echo "::error file=frontend-build-turbo::${esc}"
          done < /tmp/frontend-build-turbo.tail.log

          exit 1

      - name: Package build artifact
        run: |
          tar -czf ../frontend-build.tgz \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend-build.tgz
          if-no-files-found: error
