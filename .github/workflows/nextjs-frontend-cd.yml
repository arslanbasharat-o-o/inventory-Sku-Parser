name: Next.js Frontend CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "frontend/**"
      - ".github/workflows/nextjs-frontend-cd.yml"
  workflow_dispatch:

concurrency:
  group: nextjs-frontend-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_package:
    name: Build and Package Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build -- --webpack

      - name: Package build artifact
        run: |
          tar -czf ../frontend-build.tgz \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend-build.tgz
          if-no-files-found: error
