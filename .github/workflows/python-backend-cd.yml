name: Python Backend CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "**/*.py"
      - "**/*.json"
      - "requirements.txt"
      - "deploy/docker/Dockerfile.api"
      - ".github/workflows/python-backend-cd.yml"
  workflow_dispatch:
    inputs:
      publish_image:
        description: "Publish Docker image to GHCR"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: python-backend-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build_and_smoke:
    name: Build and Smoke Test API Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile.api -t sku-parser-api:ci .

      - name: Run container
        run: |
          docker run -d --name sku-parser-api-ci -p 5000:5000 sku-parser-api:ci

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/healthz >/dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs sku-parser-api-ci || true
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f sku-parser-api-ci || true

  publish_image:
    name: Publish Image to GHCR
    runs-on: ubuntu-latest
    needs: build_and_smoke
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_image == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/sku-parser-api
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
